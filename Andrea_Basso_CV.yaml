cv:
  name: Andrea Basso
  headline: Software Engineer
  location: Costabissara (VI)
  email: bassoandrea2201@gmail.com
  photo: resources/andrea_basso_photo.png
  phone: 
  website: 
  social_networks:
    - network: LinkedIn
      username: basso-andrea
    - network: GitHub
      username: bassoandrea
  custom_connections:
  sections:
    about_me:
      - "**Software Engineer appassionato, curioso e determinato, orientato a iniziative e progetti ambiziosi, stimolanti e ad alto impatto tecnologico.**"
      - Specializzato in architetture software, protocolli IoT e soluzioni Cloud-native basate su microservizi, con esperienza full-stack nello sviluppo di soluzioni end-to-end distribuite e scalabili. 
        Attento a qualità e pulizia del codice e a uno sviluppo funzionale e pianificato, sostengo le metodologie Agile e credo nel gioco di squadra.
      - Accolgo con entusiasmo ogni occasione di imparare e sperimentare nuove soluzioni e tecnologie.
    skills:
      - label: Linguaggi
        details: C# · Python · C/C++ · Java · PHP · JavaScript
      - label: Framework Desktop
        details: WPF · WinForms · Avalonia UI  
      - label: Framework Web
        details: ASP.NET Core (con EF) · Laravel (con Eloquent ORM) · Node.js · Vue.js  
      - label: Protocolli IoT
        details: gRPC · MQTT · AMQP · CoAP · OPC UA · Modbus TPC/RTU · HTTP/HTTPS (REST API)
      - label: Database
        details: MySQL · SQL Server · SQLite · MongoDB 
      - label: Cloud e DevOps
        details: Git · Docker · RabbitMQ · Microsoft Azure · Amazon Web Services (AWS)
    experience:
      - company: Axtra3D, Inc.
        position: Senior Software Engineer
        date:
        start_date: 2022-09
        end_date: present
        location: Vicenza (VI)
        work_mode: Hybrid
        summary: Progettazione, sviluppo e manutenzione di soluzioni software end-to-end per macchine industriali di additive manufacturing,
          team coordination e ownership dell'application lifecycle.
        highlights:
          - "realizzati HMI in **WPF** (con architettura **MVVM**), gestendo scenari multi-threading complessi, controllo di periferiche hardware e UI reattive e moderne"
          - "sviluppato **SDK** di comunicazione basato su **gRPC** e UI cross-platform in **Avalonia**, progettato per l'accesso real-time a dati operativi/diagnostica e controllo remoto delle macchine"
          - "progettata pipeline di telemetria e analisi predittiva su *Microsoft Azure*, consentendo raccolta, elaborazione, archiviazione dati e monitoraggio su dashboard in **ASP.NET Core**"
          - "implementata **architettura distribuita** P2P, basata su transazioni replicate e validazione distribuita (*blockchain-like*) tramite **gRPC**, permettendo scambio e sincronizzazione dei dati tra macchine
            senza server centrale, garantendo operatività offline e fault-tolerance"
          - "gestito **migrazione a .NET 8**, **refactoring** di codice legacy e **offuscamento** del sorgente, aggiornando dipendenze e rimuovendo API deprecate per migliorare performance, sicurezza e manutenibilità"
          - "coordinato le attività del team di sviluppo software e cross-team con metodologie **Agile** (Scrum), partecipando a pianificazione degli sprint, code review e brainstorming tecnici"
      - company: Tonello
        position: Software Engineer
        date:
        start_date: 2021-06
        end_date: 2022-05
        location: Sarcedo (VI)
        work_mode: On-site
        summary: Sviluppo full-stack di software per macchine industriali di finissaggio tessile e web app di supervisione e analisi dati, orientato all'ottimizzazione dei processi, modularità e scalabilità.
        highlights:
          - "sviluppati componenti del **software di supervisione** macchine e elaborazione dati, ottimizzando performance e tempi di processo, con back-end basato su **Laravel** e **API REST**, middleware di autenticazione e localizzazione e operazioni CRUD su database"
          - "progettate **web app modulari** e altamente **configurabili**, sviluppate su **architettura data-driven** per consentire la personalizzazione di funzionalità e UI, minimizzando gli interventi sul codice sorgente"
          - "adottato il framework **Vue.js** e deprecato l'utilizzo di jQuery, migliorando **efficienza, modularità e manutenibilità** dello sviluppo front-end"
          - "realizzato un **proof-of-concept** per l'utilizzo di **OPC UA** nella comunicazione tra PLC, applicativo .NET bordo macchina e server centrale, analizzandone performance e compatibilità con l'infrastruttura esistente, con l'obbiettivo di standardizzare la comunicazione"
    education:
      - institution: ITS Alto Adriatico
        area: IIoT Developer
        grade: '**90**/100'
        eqf_level: Livello 5 EQF
        date:
        start_date: 2020-10
        end_date: 2022-07
        location: Thiene (VI)
        summary: Percorso intensivo di 2 anni, incentrato su protocolli IoT e architetture Cloud, finalizzato alla costruzione di solide competenze tecniche e professionali in ambito ICT
        highlights:
          - "approccio formativo strutturato in **lezioni teoriche**, **esercitazioni pratiche**, **simulazioni** tecniche e **project work**"
          - "competenze in programmazione e ingegneria del software, design patterns, architetture Cloud (Azure, AWS), protocolli IoT, database (SQL, NoSQL), gestione big data, sviluppo web, sviluppo embedded, PLC, reti, virtualizzazione e cyber security, inglese tecnico" 
          - "capston project su sistema **IoT Cloud-native** e **microservizi**: raccolta dati da dispositivi embedded tramite **MQTT**, aggregazione e inoltro a **Azure IoT Hub** con **AMQP**, elaborazione serverless con **Azure Functions**, storage e visualizzazione su dashboard web"
          - "**2000 ore di formazione**, di cui **1200 di lezioni in aula e 800 di stage** in azienda."
      - institution: ITT G. Chilesotti
        area: Tecnico Informatico
        grade: '**96**/100'
        eqf_level: Livello 4 EQF
        date:
        start_date: 2014-08
        end_date: 2019-07
        location: Thiene (VI)
        summary: Percorso formativo quinquennale per la preparazione di tecnici specializzati in analisi, progettazione, realizzazione e gestione di sistemi informatici e reti di comunicazione 
        highlights:
    languages:
      - name: Italiano
        summary: "*Madrelingua*`‎\t\t‎`●●●●●"
      - name: Inglese
        summary: "*Intermedio*`‎\t\t‎`●●●○○"
design:
  theme: classic
  page:
    size: a4
    top_margin: 0.7in
