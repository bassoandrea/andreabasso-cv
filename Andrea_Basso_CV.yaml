    body: rgb(0, 0, 0)
    name: rgb(81, 81, 81)
    headline: rgb(110, 110, 110)
    connections: rgb(81, 81, 81)
    section_titles: rgb(81, 81, 81)
    links: rgb(81, 81, 81)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    line_spacing: 0.6em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Source Sans 3
      name: Source Sans 3
      headline: Source Sans 3
      connections: Source Sans 3
      section_titles: Source Sans 3
    font_size:
      body: 8pt
      name: 24pt
      headline: 12pt
      connections: 8pt
      section_titles: 1.4em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
